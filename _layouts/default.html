<!DOCTYPE html>
<html lang="id">
<head>
  {% include inc-default/head.html %}
</head>

<body class="theme-dark">

  {% include inc-default/header.html %}

  <main>
    {{ content }}
  </main>

  {% include inc-default/footer.html %}

  <!-- JS Core - defer biar nggak ngeblok render -->
  <script src="{{ '/assets/js/chordtales-core.js' | relative_url }}" defer></script>
  <script src="{{ '/assets/js/chordtales-renderer.js' | relative_url }}" defer></script>
  <script src="{{ '/assets/js/chordtales-dispatcher.js' | relative_url }}" defer></script>
  <script src="{{ '/assets/js/chordtales-events.js' | relative_url }}" defer></script>
  
  <!-- Eruda cuma buat development -->
  {% if jekyll.environment == "development" %}
  <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
  <script>eruda.init();</script>
  {% endif %}
  
  <!-- Schema khusus halaman chord -->
  {% if page.layout == 'chord' %}
    {% include schema-blogposting.html %}
  {% endif %}

</body>
</html>
