{% if site.ads_enabled %}
<div id="ads-bottom-wrapper" class="ads-bottom-wrapper" style="display:none;">
  <button id="ads-close-btn" class="ads-close-btn" aria-label="Close ad">×</button>
  <div id="adsense-container-bottom">
    <ins class="adsbygoogle"
     style="display:block"
     data-ad-client="ca-pub-1071319498684050"
     data-ad-format="auto"
     data-full-width-responsive="true"></ins>
  </div>
</div>

<style>
.ads-bottom-wrapper {
  position: fixed;
  bottom: 75px;
  right: 15px;
  width: 300px;
  min-height: 90px;
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: 10px;
  z-index: 9999;
  box-shadow: var(--shadow);
  overflow: hidden;
  justify-content: center;
  align-items: center;
  padding: 5px;
  display: none; /* sembunyiin dulu */
}

.ads-close-btn {
  position: absolute;
  top: 4px;
  right: 6px;
  background: transparent;
  color: #aaa;
  border: none;
  width: 18px;
  height: 18px;
  font-size: 16px;
  line-height: 16px;
  cursor: pointer;
  z-index: 10000;
  padding: 0;
  opacity: 0.4;
  transition: opacity 0.2s;
}
.ads-close-btn:hover { opacity: 0.8; color: #666; }

#adsense-container-top { width: 100%; display: flex; justify-content: center; align-items: center; }
.ads-bottom-wrapper ins.adsbygoogle { display: block !important; margin: 0 auto; }

@media (max-width: 400px) {
  .ads-bottom-wrapper { width: 260px; min-height: 80px; right: 10px; bottom: 70px; }
  .ads-close-btn { width: 20px; height: 20px; }
}
</style>

<script>
(function() {
  let adShown = false;
  const wrapper = document.getElementById('ads-bottom-wrapper');
  const closeBtn = document.getElementById('ads-close-btn');
  const PAGE_ID = location.pathname; // ID unik per halaman
  const CLOSE_TIME_KEY = 'adsCloseTime_' + PAGE_ID;

  // Cek kalo user udah close & belum 10 menit
  let closeTime = sessionStorage.getItem(CLOSE_TIME_KEY);
  if(closeTime && (Date.now() - parseInt(closeTime)) < 600000) {
    return; // Belum 10 menit, skip
  }

  function showAd() {
    if(adShown) return;
    adShown = true;
    wrapper.style.display = 'flex';
    (adsbygoogle = window.adsbygoogle || []).push({});
    window.removeEventListener('scroll', onScroll);
  }

  function onScroll() {
    if(window.scrollY >= 300) {
      showAd();
    }
  }

  // Pas close, simpen waktu close + halaman ini
  closeBtn.addEventListener('click', function() {
    wrapper.style.display = 'none';
    sessionStorage.setItem(CLOSE_TIME_KEY, Date.now());
    
    // Reset setelah 10 menit biar muncul lagi
    setTimeout(() => {
      sessionStorage.removeItem(CLOSE_TIME_KEY);
      adShown = false;
      window.addEventListener('scroll', onScroll, {passive: true});
    }, 600000); // 600000ms = 10 menit
  });

  window.addEventListener('scroll', onScroll, {passive: true});
  if(window.scrollY >= 300) showAd();
})();
</script>
{% endif %}
