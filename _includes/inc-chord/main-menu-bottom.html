<div id="tuner-screen" class="tuner-overlay" style="display:none;">

    </div>

        <p style="color:var(--text-muted)">Sensor Audio Ready...</p>

</div>

            <div class="menu" data-type="transpose" onclick="handleMenuClick('transpose', this)">
