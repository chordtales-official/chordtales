{% if site.ads_enabled %}
<div id="cookie-banner" class="cookie-banner">
  <div class="cookie-content">
    <div class="cookie-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 2a10 10 0 1 0 10 10 4 4 0 0 1-5-5 4 4 0 0 1-5-5"/>
        <path d="M8.5 8.5v.01M16 15.5v.01M12 12v.01M11 17v.01M7 14v.01"/>
      </svg>
    </div>
    
    <div class="cookie-text">
      <h3>Cookie buat pengalaman lebih baik</h3>
      <p>
        CHORDTALES pakai cookie buat nyimpen tema dan ningkatin performa situs + iklan. 
        Dengan klik "Mengerti", kamu setuju sama 
        <a href="/kebijalan-privasi">Kebijakan Privasi</a> kami.
      </p>
    </div>
    
    <div class="cookie-actions">
      <button id="cookie-accept" class="cookie-btn cookie-btn-primary">Mengerti</button>
    </div>
  </div>
</div>

<style>
.cookie-banner {
  position: fixed;
  bottom: 20px;
  left: 20px;
  right: 20px;
  background: var(--bg-container);
  border: 1px solid var(--border-color);
  border-radius: 16px;
  padding: 20px;
  z-index: 10002;
  transform: translateY(150%);
  transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  box-shadow: var(--shadow);
  backdrop-filter: blur(12px);
  display: none;
}

.cookie-banner.show {
  display: block;
  transform: translateY(0);
}

.cookie-content {
  max-width: 900px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  gap: 16px;
}

.cookie-icon {
  flex-shrink: 0;
  width: 40px;
  height: 40px;
  border-radius: 12px;
  background: rgba(230, 126, 34, 0.1);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--accent-1);
}

.cookie-icon svg { width: 22px; height: 22px; }
.cookie-text { flex: 1; }
.cookie-text h3 { margin: 0 0 6px 0; font-size: 1.1rem; color: var(--text-main); }
.cookie-text p { margin: 0; font-size: 0.93rem; color: var(--text-muted); line-height: 1.6; }
.cookie-text a { color: var(--accent-1); text-decoration: underline; }
.cookie-btn { padding: 10px 24px; border-radius: 10px; font-weight: 700; font-size: 0.9rem; cursor: pointer; border: none; transition: all 0.2s ease; white-space: nowrap; }
.cookie-btn-primary { background: var(--accent-1); color: var(--bg-container); }
.cookie-btn-primary:hover { background: var(--accent-2); transform: translateY(-1px); }
.cookie-btn-primary:active { transform: translateY(0); }

@media (max-width: 768px) {
  .cookie-banner { left: 12px; right: 12px; bottom: 12px; padding: 16px; }
  .cookie-content { flex-direction: column; align-items: flex-start; gap: 14px; }
  .cookie-actions { width: 100%; }
  .cookie-btn { width: 100%; }
}
</style>

<script>
document.addEventListener('DOMContentLoaded', () => {
  const banner = document.getElementById('cookie-banner');
  const acceptBtn = document.getElementById('cookie-accept');
  
  const consent = localStorage.getItem('cookieConsent');
  const consentDate = localStorage.getItem('cookieConsentDate');
  const sixMonths = 6 * 30 * 24 * 60 * 60 * 1000;
  
  const isExpired = !consentDate || (Date.now() - parseInt(consentDate)) > sixMonths;
  
  if (!consent || isExpired) {
    setTimeout(() => {
      banner.style.display = 'block';
      setTimeout(() => banner.classList.add('show'), 10);
    }, 800);
  }
  
  acceptBtn.addEventListener('click', () => {
    localStorage.setItem('cookieConsent', 'accepted');
    localStorage.setItem('cookieConsentDate', Date.now());
    banner.classList.remove('show');
    setTimeout(() => banner.style.display = 'none', 500);
  });
});
</script>
{% endif %}
