<section class="latest-songs">
  <div class="main-wrapper">
    <h2><div data-icon="new" style="margin-top:-4px; margin-right: 6px; font-size: 1.2em;"></div> Koleksi Achord</h2>
    <p style="color: var(--text-muted); margin-top: 10px;">Mainkan juga chord terbaru dari Chordtales.</p>
    <div class="post-grid">
      {% assign sorted_chords = site.chords | sort: 'date' | reverse %}
      {% for song in sorted_chords limit: 10 %}
        <article class="post-card">
          <a href="{{ song.url }}">
            <h3 class="post-title"><span></span> {{ song.title }}</h3>
            <div class="post-card-header">
              <div class="post-meta">
                  <!--<div data-icon="mic"></div>-->
                  <p>{{ song.artist }}</p>
              </div>
              <span class="post-date">{{ song.date | date: "%d %b" }}</span>
            </div>
            
          </a>
        </article>
      {% endfor %}
    </div>
    <a href="/daftar-chords/" class="btn-more">Lihat Daftar Chord →</a>
  </div>
</section>
