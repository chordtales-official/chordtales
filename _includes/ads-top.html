{% if site.ads_enabled %}
<div id="ads-top-wrapper" class="ads-top-wrapper">
  <span class="ads-label">Advertisement</span>
  <div id="adsense-container-top">
    <ins class="adsbygoogle"
     style="display:block"
     data-ad-client="ca-pub-1071319498684050"
     data-ad-format="auto"
     data-full-width-responsive="true"></ins>
  </div>
</div>

<style>
.ads-top-wrapper {
  margin: 20px 0;
  position: relative;
  min-height: 90px;
  background: var(--bg-card);
  border-radius: 8px;
  padding: 22px 8px 12px;
  border: 1px solid var(--border-color);
  box-shadow: var(--shadow);
  display: flex;
  justify-content: center;
  align-items: center;
}

.ads-label {
  position: absolute;
  top: 6px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 10px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  font-weight: 500;
  opacity: 0.7;
}

#adsense-container-top { width: 100%; display: flex; justify-content: center; align-items: center; }
.ads-top-wrapper ins.adsbygoogle { display: block !important; margin: 0 auto; }
</style>

<script>
  (window.adsbygoogle = window.adsbygoogle || []).push({});
</script>
{% endif %}
